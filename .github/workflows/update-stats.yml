# GitHub Profile README - Auto Stats Update
# Replace YOUR_REPO_1, YOUR_REPO_2 with your repo names
# username is auto-filled via github.repository_owner (profile repo format)

name: Update Profile Stats

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dark&hide_border=true&title_color=2ea043&icon_color=58a6ff&text_color=c9d1d9&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=dark&hide_border=true&title_color=2ea043&text_color=c9d1d9&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Featured projects - replace YOUR_REPO_1, YOUR_REPO_2 with your repo names
      # Remove the second step if you only want 1 project
      - name: Generate pin card 1
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=YOUR_REPO_1&theme=dark&hide_border=true&title_color=2ea043&icon_color=58a6ff
          path: profile/pin-repo1.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card 2
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=YOUR_REPO_2&theme=dark&hide_border=true&title_color=2ea043&icon_color=58a6ff
          path: profile/pin-repo2.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download trophy
        run: |
          mkdir -p profile
          curl -s "https://gh-trophy.cdnsoft.net/?username=${{ github.repository_owner }}&theme=darkhub&no-frame=true&no-bg=true&margin-w=4&title_color=2ea043&icon_color=58a6ff&text_color=c9d1d9" -o profile/trophy.svg

      - name: Download streak
        run: |
          curl -s "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=dark&hide_border=true&title_color=2ea043&ring_color=58a6ff&fire=58a6ff&currStreakLabel=c9d1d9&text_color=c9d1d9" -o profile/streak.svg

      - name: Download activity graph
        run: |
          curl -s "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=react-dark&hide_border=true&area=true&color=2ea043&line=58a6ff&point=c9d1d9" -o profile/activity.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
